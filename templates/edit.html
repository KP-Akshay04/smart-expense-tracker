<!DOCTYPE html>
<html>
<head>
    <title>Edit Expense</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-white">

<div class="container mt-5">
    <h2 class="text-center mb-4">✏️ Edit Expense</h2>

    <div class="card p-4 shadow bg-light text-dark">
        <form method="POST">

            <label>Title</label>
            <input type="text" name="title" class="form-control mb-3" value="{{ expense[1] }}" required>

            <label>Amount</label>
            <input type="number" name="amount" class="form-control mb-3" value="{{ expense[2] }}" required>

            <label>Category</label>
            <select name="category" class="form-control mb-3">
                <option {% if expense[3]=='Food' %}selected{% endif %}>Food</option>
                <option {% if expense[3]=='Travel' %}selected{% endif %}>Travel</option>
                <option {% if expense[3]=='Bills' %}selected{% endif %}>Bills</option>
                <option {% if expense[3]=='Other' %}selected{% endif %}>Other</option>
            </select>

            <button class="btn btn-success w-100">Update Expense</button>

        </form>
    </div>
</div>

</body>
</html>
